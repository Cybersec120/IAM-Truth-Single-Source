name: IAM Platform CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  TF_VERSION: "1.6.6"
  PYTHON_VERSION: "3.12"
  ARM_CLIENT_ID:     ${{ secrets.ARM_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
  ARM_TENANT_ID:     ${{ secrets.ARM_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}

jobs:
  # ── Python scripts: lint + security scan ────────────────────────────────────
  python-checks:
    name: Python — lint, type-check, secrets scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy bandit detect-secrets

      - name: Ruff lint (PEP8 + import order)
        run: ruff check scripts/

      - name: Type check
        run: mypy scripts/ --ignore-missing-imports --strict

      - name: Bandit security scan
        # Fail on HIGH severity issues (B-level)
        run: bandit -r scripts/ -ll -ii -x scripts/tests/

      - name: Detect secrets
        run: detect-secrets scan --baseline .secrets.baseline

  # ── Terraform: entra-id module ───────────────────────────────────────────────
  terraform-entra-id:
    name: Terraform — entra-id validate + plan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/entra-id

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

      - name: tflint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: Run tflint
        run: |
          tflint --init
          tflint --format compact

      - name: Checkov security scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/entra-id
          framework: terraform
          quiet: true
          soft_fail: false
          skip_check: >
            CKV_AZURE_109,
            CKV_AZURE_110

      - name: Terraform plan (PR only)
        if: github.event_name == 'pull_request'
        run: terraform plan -no-color -out=plan.tfplan
        env:
          AZURE_TENANT_ID:     ${{ secrets.ARM_TENANT_ID }}
          AZURE_CLIENT_ID:     ${{ secrets.ARM_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}

  # ── Terraform: WAF module ────────────────────────────────────────────────────
  terraform-waf:
    name: Terraform — waf validate + plan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/waf

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

      - name: Checkov security scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/waf
          framework: terraform
          quiet: true
          soft_fail: false

  # ── Terraform apply: entra-id (main branch only) ─────────────────────────────
  apply-entra-id:
    name: Terraform apply — entra-id (prod)
    runs-on: ubuntu-latest
    needs: [python-checks, terraform-entra-id]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    defaults:
      run:
        working-directory: terraform/entra-id

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        run: terraform init

      - name: Terraform apply
        run: terraform apply -auto-approve
        env:
          AZURE_TENANT_ID:     ${{ secrets.ARM_TENANT_ID }}
          AZURE_CLIENT_ID:     ${{ secrets.ARM_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}

  # ── Terraform apply: WAF (main branch only) ───────────────────────────────────
  apply-waf:
    name: Terraform apply — waf (prod)
    runs-on: ubuntu-latest
    needs: [python-checks, terraform-waf]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    defaults:
      run:
        working-directory: terraform/waf

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        run: terraform init

      - name: Terraform apply
        run: terraform apply -auto-approve
